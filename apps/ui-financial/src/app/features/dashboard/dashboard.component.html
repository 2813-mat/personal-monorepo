<div class="tab-bar">
  @for (tab of tabs; track tab.id) {
    <button
      class="tab-btn"
      [class.active]="activeTab() === tab.id"
      (click)="setTab(tab.id)"
      [title]="tab.desc"
    >
      {{ tab.label }}
    </button>
  }
</div>

@if (loading()) {
  <p class="dash-state">Carregando os dados de {{ monthLabel() }}…</p>
} @else if (isEmpty()) {
  <p class="dash-state">
    Nenhum lançamento em {{ monthLabel() }}. Use o botão de novo lançamento para começar.
  </p>
}

@switch (activeTab()) {
  @case ('a') { <cf-dashboard-a /> }
  @case ('b') { <cf-dashboard-b /> }
  @default    { <cf-dashboard-c /> }
}
